name: Deploy App

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-app-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy App Service Container
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
    env:
      AZURE_CORE_OUTPUT: none
      DEPLOY_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}

    steps:
      - name: Decide whether to deploy
        id: gate
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${AUTO_DEPLOY_ENABLED}" = "true" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          AUTO_DEPLOY_ENABLED: ${{ vars.AUTO_DEPLOY_ENABLED }}

      - name: Skip automatic deploy
        if: steps.gate.outputs.should_deploy != 'true'
        run: |
          echo "Skipping automatic app deployment because AUTO_DEPLOY_ENABLED is not set to true for this environment."

      - name: Check out repository
        if: steps.gate.outputs.should_deploy == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Validate deployment settings
        if: steps.gate.outputs.should_deploy == 'true'
        shell: bash
        run: |
          missing=0
          for name in AZURE_WEBAPP_NAME AZURE_RESOURCE_GROUP AZURE_CONTAINER_REGISTRY_NAME AZURE_CONTAINER_REGISTRY_LOGIN_SERVER; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub environment variable: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINER_REGISTRY_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
          AZURE_CONTAINER_REGISTRY_LOGIN_SERVER: ${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}

      - name: Azure login with OIDC
        if: steps.gate.outputs.should_deploy == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        if: steps.gate.outputs.should_deploy == 'true'
        run: az acr login --name "${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}"

      - name: Build image tags
        if: steps.gate.outputs.should_deploy == 'true'
        id: image
        shell: bash
        run: |
          repository="${AZURE_CONTAINER_REPOSITORY:-bonzo-assistant}"
          image_tag="${GITHUB_SHA}"
          image_ref="${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER}/${repository}:${image_tag}"
          latest_ref="${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER}/${repository}:${DEPLOY_ENVIRONMENT}-latest"
          echo "repository=$repository" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "image_ref=$image_ref" >> "$GITHUB_OUTPUT"
          echo "latest_ref=$latest_ref" >> "$GITHUB_OUTPUT"
        env:
          AZURE_CONTAINER_REGISTRY_LOGIN_SERVER: ${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}
          AZURE_CONTAINER_REPOSITORY: ${{ vars.AZURE_CONTAINER_REPOSITORY }}

      - name: Build container image
        if: steps.gate.outputs.should_deploy == 'true'
        run: |
          docker build \
            --tag "${{ steps.image.outputs.image_ref }}" \
            --tag "${{ steps.image.outputs.latest_ref }}" \
            .

      - name: Push container image
        if: steps.gate.outputs.should_deploy == 'true'
        run: |
          docker push "${{ steps.image.outputs.image_ref }}"
          docker push "${{ steps.image.outputs.latest_ref }}"

      - name: Point App Service at pushed image
        if: steps.gate.outputs.should_deploy == 'true'
        shell: bash
        run: |
          az webapp config container set \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --docker-custom-image-name "${IMAGE_REF}"
          az webapp restart \
            --name "${AZURE_WEBAPP_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}"
        env:
          AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
