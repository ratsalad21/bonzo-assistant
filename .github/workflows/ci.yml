name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-checks:
    name: Python Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python modules
        run: python -m py_compile app.py app_state.py config.py openai_client.py agent_tools.py agents.py chat_flow.py documents.py llm.py rag.py sessions.py sidebar.py ui.py

      - name: Run tests
        run: pytest

  terraform-checks:
    name: Terraform Checks
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        workspace:
          - infra/terraform/bootstrap-state
          - infra/terraform/azure-app-service

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        working-directory: ${{ matrix.workspace }}
        run: terraform fmt -check

      - name: Initialize Terraform without backend
        working-directory: ${{ matrix.workspace }}
        run: terraform init -backend=false

      - name: Validate Terraform
        working-directory: ${{ matrix.workspace }}
        run: terraform validate
